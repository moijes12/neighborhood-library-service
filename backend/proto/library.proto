syntax = "proto3";

package library;


service BookService {
    rpc ListBooks (ListBooksRequest) returns (ListBooksResponse);
    rpc GetBook (GetBookRequest) returns (Book);
    rpc CreateBookRequest (CreateBookRequest) returns (Book);
    rpc UpdateBookRequest (UpdateBookRequest) returns (Book);
}

message Book {
    int32 id = 1;
    string title = 2;
    string author = 3;
    string isbn = 4;
    book is_available = 5;
    string created_at = 6;
    string updated_at = 7;
}

message CreateBookRequest {
    string title = 1;
    string author = 2;
    string isbn = 3;
}

message UpdateBookRequest {
    int32 id = 1;
    string title = 2;
    string author = 3;
    string isbn = 4;
    book is_available = 5;
}

message GetBookRequest {
    int32 id = 1;
}

message ListBooksRequest {
    int32 page = 1;
    int32 page_size = 2;
}

message ListBooksResponse {
    repeated Book books = 1;
    int32 total = 2;
}
